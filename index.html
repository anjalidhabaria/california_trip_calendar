<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>California Adventure 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f7;--card:#fff;--text:#1a1a1a;--sub:#888;--border:#e8e5e0;--hover:#f5f3f0;--sf:#3b82f6;--sf-bg:#eff6ff;--tr:#16a34a;--tr-bg:#f0fdf4;--dr:#ea580c;--dr-bg:#fff7ed;--pk:#9333ea;--pk-bg:#faf5ff;--ev:#db2777;--ev-bg:#fdf2f8;--rs:#9ca3af;--rs-bg:#f9fafb;--r:12px;--rs2:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.ctn{max-width:520px;margin:0 auto;padding:10px 14px 40px}
h1{font-family:'Playfair Display',serif}
button,input{font-family:'Outfit',sans-serif}
.hdr{text-align:center;padding:20px 0 16px}.hdr h1{font-size:24px;font-weight:700;letter-spacing:-0.5px}.hdr .sub{font-size:12px;color:var(--sub);margin-top:2px}
.ubadge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:var(--card);padding:4px 14px;border-radius:20px;font-size:11px;color:var(--sub);border:1px solid var(--border);cursor:pointer}
.signout{font-size:9px;color:#dc2626;margin-left:4px;cursor:pointer;text-decoration:underline}
.leg{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}.leg-i{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--sub);font-weight:500}.leg-d{width:7px;height:7px;border-radius:50%}
.mtabs{display:flex;justify-content:center;gap:6px;margin-bottom:14px}.mtab{padding:6px 28px;border-radius:20px;border:1px solid var(--border);font-size:13px;font-weight:600;background:var(--card);color:var(--sub);cursor:pointer}.mtab.a{background:var(--text);color:#fff;border-color:var(--text)}
.cal{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.calhd{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}.calhd div{padding:8px 0;text-align:center;font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:1.5px}
.calg{display:grid;grid-template-columns:repeat(7,1fr)}
.cc{padding:4px;min-height:68px;border-right:1px solid #f3f1ee;border-bottom:1px solid #f3f1ee;cursor:pointer;transition:background .15s;position:relative}.cc:hover{background:var(--hover)}.cc.empty{opacity:.15;cursor:default}.cc.sel{background:var(--sf-bg)}
.cc .dn{font-size:11px;font-weight:700;color:#444;display:flex;align-items:center;gap:2px;margin-bottom:2px}.cc .dt2{font-size:7.5px;line-height:1.3;color:#777;overflow:hidden;max-height:20px}.cc .jrs{margin-top:2px;display:flex;flex-wrap:wrap;gap:1px}.cc .jrs span{font-size:6px;color:#fff;padding:0 3px;border-radius:4px}
.mbdg{font-size:7px;background:#666;color:#fff;border-radius:4px;padding:0 3px}
.hcnt{font-size:6px;background:#f59e0b;color:#fff;padding:0 3px;border-radius:4px;margin-left:1px}
.ddate{font-size:13px;font-weight:600;color:#555;margin-bottom:8px}
.crd{background:var(--card);border-radius:var(--r);border:2px solid var(--border);padding:14px;margin-bottom:8px}
.crd-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.crd-ty{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}.crd-t{font-size:16px;font-weight:700;margin:2px 0 0}
.crd-t input{width:100%;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:14px;font-weight:700;outline:none}
.cbtns{display:flex;gap:4px;flex-shrink:0}.bedit{background:#f3f4f6;border:none;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;color:#888;cursor:pointer}.bedit.a{background:#dbeafe;color:#3b82f6}.bcls{background:none;border:none;font-size:18px;color:#ccc;cursor:pointer}
.tsel{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}.tbtn{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;cursor:pointer}
.acts{margin-bottom:10px}.acts-l{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.arow{display:flex;gap:5px;margin-bottom:4px;align-items:flex-start}.adot{width:4px;height:4px;border-radius:50%;margin-top:6px;flex-shrink:0}.aic{font-size:12px;flex-shrink:0;margin-top:1px}.atm{font-size:10px;font-weight:600;min-width:45px;flex-shrink:0;margin-top:2px}.atx{font-size:12px;color:#444;line-height:1.4}
.aed{display:flex;gap:3px;margin-bottom:5px;align-items:center}.aed input{border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-size:10px;outline:none}.aed .tmi{width:58px}.aed .txi{flex:1}
.ibtn{background:#f3f4f6;border:1px solid #ddd;border-radius:4px;padding:1px 5px;font-size:13px;cursor:pointer;min-width:26px;text-align:center}
.rbtn{background:#fee2e2;border:none;border-radius:4px;padding:2px 6px;font-size:9px;color:#dc2626;cursor:pointer;flex-shrink:0}
.ipk{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;padding:4px;background:#f9fafb;border-radius:5px;border:1px solid #eee}.ipk button{background:#fff;border:1px solid #e5e5e5;border-radius:3px;padding:1px 3px;font-size:13px;cursor:pointer}.ipk button.s{background:#dbeafe;border-color:#3b82f6}
.aab{margin-top:4px;padding:4px;border-radius:5px;border:1px dashed #ccc;background:#fafafa;font-size:10px;color:#888;width:100%;cursor:pointer}
.sbox{margin-bottom:10px;padding:8px 10px;background:#f8f9fb;border-radius:var(--rs2);border:1px solid #eee}.slb{font-size:8px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px}.svl{font-size:11px;color:#555;margin-top:2px}.sinp{display:block;width:100%;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:11px;margin-top:3px;outline:none}
.tipb{padding:6px 8px;background:#fefce8;border-radius:6px;border:1px solid #fde68a;margin-bottom:10px;font-size:10px;color:#854d0e}
.rmcb{padding:5px;border-radius:6px;border:1px solid #fca5a5;background:#fef2f2;font-size:10px;color:#dc2626;width:100%;cursor:pointer;margin-bottom:8px}
.cfb{padding:10px;border-radius:6px;border:1px solid #fca5a5;background:#fef2f2;text-align:center;margin-bottom:8px}.cfb p{font-size:11px;color:#dc2626;font-weight:600;margin-bottom:6px}.cfb .bs{display:flex;gap:6px;justify-content:center}.cfb .y{padding:4px 14px;border-radius:5px;border:none;background:#dc2626;color:#fff;font-size:10px;font-weight:600;cursor:pointer}.cfb .n{padding:4px 14px;border-radius:5px;border:1px solid #ddd;background:#fff;color:#666;font-size:10px;cursor:pointer}
.acb{width:100%;padding:10px;border-radius:var(--rs2);border:2px dashed #d0cdc8;background:transparent;font-size:12px;color:#999;font-weight:600;cursor:pointer;margin-bottom:10px}.acb:hover{border-color:#aaa;color:#666}
.jsec{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:12px;margin-bottom:10px}
.jh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.jlb{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px}
.jbtn{padding:5px 14px;border-radius:16px;border:none;font-size:11px;font-weight:600;cursor:pointer}
.jns{display:flex;flex-wrap:wrap;gap:5px}.jns .jp{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;border:1px solid #93c5fd;background:#eff6ff;color:#3b82f6}
.jp .cnt{font-size:9px;background:#3b82f6;color:#fff;padding:0 5px;border-radius:8px;font-weight:700}
.jem{font-size:11px;color:#ccc;font-style:italic}
.hcwrap{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px;background:#f8f9fb;border-radius:8px;border:1px solid #eee}
.hcwrap label{font-size:11px;color:#555;flex:1}.hcwrap .pm{width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555}.hcwrap .pm:hover{background:#f0f0f0}.hcwrap .num{font-size:16px;font-weight:700;min-width:24px;text-align:center;color:var(--text)}
.calexp{display:flex;gap:6px;margin-top:8px}.calexp button{flex:1;padding:6px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}.calexp button:hover{background:var(--hover)}
.hl{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:12px}.hl h3{font-size:14px;font-weight:700;margin-bottom:8px}
.hli{display:flex;align-items:center;gap:8px;padding:7px 8px;margin-bottom:3px;border-radius:var(--rs2);cursor:pointer;border:1px solid transparent;transition:all .15s}.hli:hover{border-color:var(--border)}
.hld{width:6px;height:6px;border-radius:50%;flex-shrink:0}.hlif{flex:1;min-width:0}.hlt{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hldt{font-size:9px;color:var(--sub)}.hla{font-size:12px;opacity:.2}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.mdl{background:var(--card);border-radius:18px;padding:28px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mdl h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px}.mdl p{color:var(--sub);font-size:12px;margin-bottom:16px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;color:#333}.gbtn:hover{background:#f5f5f5;border-color:#bbb}
.gbtn img{width:20px;height:20px}
.denied{text-align:center;padding:60px 20px}.denied h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px}.denied p{color:var(--sub);font-size:13px;margin-bottom:20px}
.denied .email{font-weight:600;color:var(--text)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.ai{animation:fi .2s ease}
</style>
</head>
<body>
<div class="ctn" id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ══════════════════════════════════════════════════
// 🔧 CONFIG — REPLACE THESE WITH YOUR OWN VALUES
// ══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDA-y9LpxhBgKtV67Ea-AcCbzS-G9iyrJE",
  authDomain: "california-trip-calendar-2026.firebaseapp.com",
  databaseURL: "https://california-trip-calendar-2026-default-rtdb.firebaseio.com",
  projectId: "california-trip-calendar-2026"
};

// Emails are stored in Firebase, not in code.
// To set up: go to Firebase Console > Realtime Database and manually add:
//   access/approved/0: "email1@gmail.com"
//   access/approved/1: "email2@gmail.com"
//   access/admins/0: "youremail@gmail.com"
//
// Or run this in browser console ONCE after first sign-in to seed them:
//   firebase.database().ref("access").set({
//     approved: ["you@gmail.com", "mom@gmail.com", "dad@gmail.com"],
//     admins: ["you@gmail.com"]
//   });

let APPROVED_EMAILS = [];
let ADMIN_EMAILS = [];
// ══════════════════════════════════════════════════

let db=null,auth=null,useFB=false;
try{
  if(FIREBASE_CONFIG.apiKey!=="YOUR_API_KEY_HERE"){
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();auth=firebase.auth();useFB=true;
  }
}catch(e){console.warn("Firebase not configured");}

function dbOn(p,cb){if(useFB){db.ref(p).on("value",s=>cb(s.val()));}else{cb(JSON.parse(localStorage.getItem("t_"+p)||"null"));}}
function dbSet(p,v){if(useFB)db.ref(p).set(v);else localStorage.setItem("t_"+p,JSON.stringify(v));}

const T={sf:{bg:"#eff6ff",br:"#3b82f6",lb:"SF",dt:"#3b82f6",ic:"🌉"},tr:{bg:"#f0fdf4",br:"#16a34a",lb:"Day Trip",dt:"#16a34a",ic:"🚗"},dr:{bg:"#fff7ed",br:"#ea580c",lb:"Travel",dt:"#ea580c",ic:"✈️"},pk:{bg:"#faf5ff",br:"#9333ea",lb:"Park",dt:"#9333ea",ic:"🏔"},ev:{bg:"#fdf2f8",br:"#db2777",lb:"Event",dt:"#db2777",ic:"⭐"},rs:{bg:"#f9fafb",br:"#9ca3af",lb:"Rest",dt:"#9ca3af",ic:"😴"}};
const IC=["🌉","🚗","✈️","🏔","⭐","😴","🏨","🍴","📷","🎶","🛒","⚽","🏆","🍷","🎉","🏰","🐋","🏜️","🌲","🏔️","🌊","🚣","🎆","🎒","💛","☕","🎨","🧭","🎬","🏖️"];
const DW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MN=["Jan","Feb","Mar","Apr","May","Jun","Jul"];
let _id=0;function uid(){return"c"+(++_id)+"_"+Date.now();}
function pd(s){const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function fd(d){return DW[d.getDay()]+", "+MN[d.getMonth()]+" "+d.getDate();}
function dkey(mo,d){return"2026-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}

// Default data — only used if Firebase has no data yet.
// All itinerary edits are saved in Firebase Realtime Database under "days".
const DD=(function(){
  const d={};
  const start=new Date(2026,5,15),end=new Date(2026,6,15);
  for(let dt=new Date(start);dt<=end;dt.setDate(dt.getDate()+1)){
    const k=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
    d[k]=[{id:uid(),t:"Day "+(Math.round((dt-start)/86400000)+1),ty:"sf",a:[{tx:"",tm:"",ic:""}],s:"",tip:""}];
  }
  return d;
})();

let S={days:JSON.parse(JSON.stringify(DD)),joins:{},user:null,sel:null,month:5,edId:null,eiIdx:null,cc:null,authState:"loading"};

function isAdmin(){return S.user&&ADMIN_EMAILS.indexOf(S.user.email)>=0;}
function isApproved(){return S.user&&APPROVED_EMAILS.indexOf(S.user.email)>=0;}

function checkAccess(){
  if(S.user&&isApproved()){S.authState="ok";loadData();}
  else if(S.user){S.authState="denied";}
  else{S.authState="login";}
  render();
}

function init(){
  if(useFB){
    // Load access lists from Firebase first
    db.ref("access").once("value").then(function(snap){
      const val=snap.val();
      if(val){
        APPROVED_EMAILS=val.approved||[];
        ADMIN_EMAILS=val.admins||[];
      }
      // Then listen for auth
      auth.onAuthStateChanged(function(u){
        S.user=u;
        checkAccess();
      });
    }).catch(function(){
      // If access node doesn't exist yet, allow first user to set up
      auth.onAuthStateChanged(function(u){
        S.user=u;
        if(u){
          // First user becomes admin — seed the access list
          APPROVED_EMAILS=[u.email];
          ADMIN_EMAILS=[u.email];
          db.ref("access").set({approved:[u.email],admins:[u.email]});
          S.authState="ok";loadData();
        }else{S.authState="login";}
        render();
      });
    });
  }else{
    const n=localStorage.getItem("t_name");
    S.user=n?{displayName:n,email:"local@local"}:null;
    APPROVED_EMAILS=["local@local"];ADMIN_EMAILS=["local@local"];
    S.authState=n?"ok":"login";
    if(n)loadData();
    render();
  }
}

let _editing=false;let _saveTimer=null;
function debouncedSaveDays(){
  _editing=true;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){dbSet("days",S.days);_editing=false;},1500);
}
function fixArrays(days){
  if(!days||typeof days!=="object")return days;
  const fixed={};
  Object.keys(days).forEach(dk=>{
    let cards=days[dk];
    // Firebase converts arrays to objects with numeric keys
    if(cards&&typeof cards==="object"&&!Array.isArray(cards)){
      cards=Object.values(cards);
    }
    if(Array.isArray(cards)){
      cards=cards.filter(c=>c!=null).map(c=>{
        // Also fix activities array
        if(c.a&&typeof c.a==="object"&&!Array.isArray(c.a)){
          c.a=Object.values(c.a);
        }
        if(!c.a)c.a=[];
        if(!c.id)c.id=uid();
        return c;
      });
    }else{
      cards=[];
    }
    fixed[dk]=cards;
  });
  return fixed;
}

function loadData(){
  dbOn("days",function(v){if(v&&!_editing){S.days=fixArrays(v);render();}});
  dbOn("joins",function(v){if(v&&!_editing){S.joins=v;render();}});
}
function saveDays(){debouncedSaveDays();}
function saveDaysNow(){_editing=true;dbSet("days",S.days);setTimeout(function(){_editing=false;},2000);}
function saveJoins(){dbSet("joins",S.joins);}

function doLogin(){
  if(useFB){
    const prov=new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(prov).catch(e=>console.error(e));
  }else{
    const n=prompt("Enter your name:");
    if(n){localStorage.setItem("t_name",n);S.user={displayName:n,email:"local@local"};S.authState="ok";loadData();render();}
  }
}
function doLogout(){
  if(useFB)auth.signOut();
  else{localStorage.removeItem("t_name");S.user=null;S.authState="login";render();}
}

// Joins with headcount
function getJoinInfo(dk2){return S.joins[dk2]||{};}// {email:{name,count}}
function toggleJoin(dk2){
  if(!S.user)return;
  const j=getJoinInfo(dk2);
  const k=S.user.email;
  if(j[k]){delete j[k];}
  else{j[k]={name:S.user.displayName||S.user.email.split("@")[0],count:1};}
  S.joins[dk2]=j;saveJoins();render();
}
function setCount(dk2,cnt){
  if(!S.user)return;
  const j=getJoinInfo(dk2);
  const k=S.user.email;
  if(j[k]){j[k].count=Math.max(1,cnt);S.joins[dk2]=j;saveJoins();render();}
}
function totalPeople(dk2){
  const j=getJoinInfo(dk2);let t=0;
  Object.values(j).forEach(v=>t+=(v.count||1));return t;
}

// Calendar export
function makeGcalUrl(dk2){
  const cards=S.days[dk2];if(!cards)return"";
  const dt=pd(dk2);const ds=dk2.replace(/-/g,"");
  let title="California Trip: ";let desc="";
  cards.forEach(c=>{title+=c.t+", ";c.a.forEach(a=>{desc+=(a.tm?a.tm+": ":"")+a.tx+"\n";});if(c.s)desc+="Staying: "+c.s+"\n";desc+="\n";});
  title=encodeURIComponent(title.slice(0,-2));desc=encodeURIComponent(desc);
  return"https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&dates="+ds+"/"+ds+"&details="+desc;
}
function makeICS(dk2){
  const cards=S.days[dk2];if(!cards)return;
  const ds=dk2.replace(/-/g,"");
  let title="California Trip: ";let desc="";
  cards.forEach(c=>{title+=c.t+", ";c.a.forEach(a=>{desc+=(a.tm?a.tm+": ":"")+a.tx+"\\n";});if(c.s)desc+="Staying: "+c.s+"\\n";desc+="\\n";});
  title=title.slice(0,-2);
  const ics="BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART;VALUE=DATE:"+ds+"\nDTEND;VALUE=DATE:"+ds+"\nSUMMARY:"+title+"\nDESCRIPTION:"+desc+"\nEND:VEVENT\nEND:VCALENDAR";
  const blob=new Blob([ics],{type:"text/calendar"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="trip-"+dk2+".ics";a.click();
}

// Edit functions (admin only)
function updCard(dk2,cid,f,v,noRender){S.days[dk2].forEach(c=>{if(c.id===cid)c[f]=v;});if(noRender){debouncedSaveDays();}else{saveDaysNow();render();}}
function updAct(dk2,cid,i,f,v,noRender){S.days[dk2].forEach(c=>{if(c.id===cid)c.a[i][f]=v;});if(noRender){debouncedSaveDays();}else{saveDaysNow();render();}}
function rmAct(dk2,cid,i){S.days[dk2].forEach(c=>{if(c.id===cid)c.a.splice(i,1);});S.eiIdx=null;saveDaysNow();render();}
function addAct(dk2,cid){S.days[dk2].forEach(c=>{if(c.id===cid)c.a.push({tx:"New activity",tm:"",ic:""});});saveDaysNow();render();}
function addCard(dk2){
  const nid=uid();
  if(!S.days)S.days={};
  if(!S.days[dk2]||!Array.isArray(S.days[dk2]))S.days[dk2]=[];
  S.days[dk2].push({id:nid,t:"New card",ty:"sf",a:[{tx:"Activity",tm:"",ic:""}],s:"",tip:""});
  S.edId=nid;saveDaysNow();render();
}
function rmCard(dk2,cid){
  if(!S.days[dk2])return;
  S.days[dk2]=S.days[dk2].filter(c=>c.id!==cid);
  S.cc=null;S.edId=null;saveDaysNow();render();
}

// Member management (admin only)
function addMember(email){
  if(!email||!email.includes("@"))return;
  email=email.trim().toLowerCase();
  if(APPROVED_EMAILS.indexOf(email)<0)APPROVED_EMAILS.push(email);
  if(useFB)db.ref("access/approved").set(APPROVED_EMAILS);
  render();
}
function removeMember(email){
  APPROVED_EMAILS=APPROVED_EMAILS.filter(e=>e!==email);
  if(useFB)db.ref("access/approved").set(APPROVED_EMAILS);
  render();
}
S.showMembers=false;

// DOM helper
function h(tag,at,...kids){
  const el=document.createElement(tag);
  if(at)Object.keys(at).forEach(k=>{
    if(k==="className")el.className=at[k];
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),at[k]);
    else if(k==="style"&&typeof at[k]==="object")Object.assign(el.style,at[k]);
    else el.setAttribute(k,at[k]);
  });
  kids.flat(Infinity).forEach(kid=>{
    if(kid==null||kid===false)return;
    if(typeof kid==="string"||typeof kid==="number")el.appendChild(document.createTextNode(kid));
    else el.appendChild(kid);
  });return el;
}

let _renderTimer=null;
function debouncedRender(){if(_renderTimer)clearTimeout(_renderTimer);_renderTimer=setTimeout(render,50);}

function render(){
  const scrollY=window.scrollY;
  const app=document.getElementById("app");app.innerHTML="";
  // Restore scroll after DOM update
  requestAnimationFrame(()=>window.scrollTo(0,scrollY));

  // Auth states
  if(S.authState==="loading"){app.appendChild(h("div",{style:{textAlign:"center",padding:"80px 20px",color:"#888"}},"Loading..."));return;}
  if(S.authState==="login"){
    app.appendChild(h("div",{className:"mdl",style:{margin:"80px auto"}},
      h("div",{style:{fontSize:"40px",marginBottom:"10px"}},"🌉"),
      h("h2",null,"California 2026"),
      h("p",null,"Sign in to view the trip calendar"),
      h("button",{className:"gbtn",onClick:doLogin},
        useFB?h("img",{src:"https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg",alt:"G"}):null,
        useFB?"Sign in with Google":"Enter your name"
      )
    ));return;
  }
  if(S.authState==="denied"){
    app.appendChild(h("div",{className:"denied"},
      h("div",{style:{fontSize:"40px",marginBottom:"10px"}},"🔒"),
      h("h2",null,"Access Required"),
      h("p",null,"You're signed in as:"),
      h("p",{className:"email"},S.user.email),
      h("p",null,"This calendar is private. Ask the organizer to add your email to the approved list."),
      h("button",{className:"gbtn",style:{maxWidth:"200px",margin:"10px auto"},onClick:doLogout},"Sign out")
    ));return;
  }

  const admin=isAdmin();
  const uname=S.user.displayName||S.user.email.split("@")[0];

  // Header
  app.appendChild(h("div",{className:"hdr"},
    h("div",{style:{fontSize:"28px"}},"🌉"),
    h("h1",null,"California 2026"),
    h("div",{className:"sub"},"Jun 15 – Jul 15 • Family Trip"),
    h("div",{className:"ubadge"},"👤 "+uname+(admin?" (admin)":""),h("span",{className:"signout",onClick:doLogout},"sign out")),
    admin?h("div",{style:{marginTop:"6px"}},h("button",{style:{fontSize:"10px",padding:"3px 12px",borderRadius:"12px",border:"1px solid #ddd",background:"#fff",cursor:"pointer",color:"#888",fontFamily:"Outfit"},onClick:()=>{S.showMembers=!S.showMembers;render();}},"👥 Manage Members")):null
  ));

  // Members panel (admin only)
  if(admin&&S.showMembers){
    const mp=h("div",{className:"crd",style:{borderColor:"#3b82f6",marginBottom:"14px"}});
    mp.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
      h("div",{style:{fontSize:"13px",fontWeight:"700"}},"👥 Approved Members"),
      h("button",{className:"bcls",onClick:()=>{S.showMembers=false;render();}},"✕")
    ));
    APPROVED_EMAILS.forEach(email=>{
      const isMe=S.user&&S.user.email===email;
      const isAdm=ADMIN_EMAILS.indexOf(email)>=0;
      mp.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"5px 8px",marginBottom:"3px",borderRadius:"6px",background:"#f8f9fb",border:"1px solid #eee"}},
        h("span",{style:{flex:"1",fontSize:"12px",color:"#333"}},email),
        isAdm?h("span",{style:{fontSize:"8px",background:"#dbeafe",color:"#3b82f6",padding:"1px 6px",borderRadius:"8px",fontWeight:"600"}},"admin"):null,
        !isMe?h("button",{style:{fontSize:"9px",background:"#fee2e2",border:"none",borderRadius:"4px",padding:"2px 8px",color:"#dc2626",cursor:"pointer"},onClick:()=>removeMember(email)},"remove"):null
      ));
    });
    const addRow=h("div",{style:{display:"flex",gap:"4px",marginTop:"8px"}});
    const emailInput=h("input",{placeholder:"email@gmail.com",style:{flex:"1",border:"1px solid #ddd",borderRadius:"6px",padding:"6px 8px",fontSize:"12px",outline:"none"}});
    const addBtn=h("button",{style:{padding:"6px 14px",borderRadius:"6px",border:"none",background:"#3b82f6",color:"#fff",fontSize:"11px",fontWeight:"600",cursor:"pointer"},onClick:()=>{addMember(emailInput.value);emailInput.value="";}},"+ Add");
    emailInput.addEventListener("keydown",e=>{if(e.key==="Enter"){addMember(emailInput.value);emailInput.value="";}});
    addRow.appendChild(emailInput);addRow.appendChild(addBtn);
    mp.appendChild(addRow);
    mp.appendChild(h("p",{style:{fontSize:"9px",color:"#aaa",marginTop:"6px"}},"Only approved emails can sign in and view the calendar."));
    app.appendChild(mp);
  }

  // Legend
  app.appendChild(h("div",{className:"leg"},...Object.keys(T).map(k=>h("div",{className:"leg-i"},h("div",{className:"leg-d",style:{background:T[k].dt}}),T[k].lb))));

  // Month tabs
  app.appendChild(h("div",{className:"mtabs"},...[5,6].map(m=>h("button",{className:"mtab"+(S.month===m?" a":""),onClick:()=>{S.month=m;S.sel=null;S.edId=null;render();}},m===5?"June":"July"))));

  // Calendar grid
  const sw=new Date(2026,S.month,1).getDay(),nd=new Date(2026,S.month+1,0).getDate();
  const cg=h("div",{className:"calg"});
  for(let i=0;i<sw;i++)cg.appendChild(h("div",{className:"cc empty"}));
  for(let d=1;d<=nd;d++){
    const dk2=dkey(S.month,d),cards=S.days[dk2],first=cards&&cards[0],tc=first?T[first.ty]:null;
    const isSel=S.sel===dk2,ji=getJoinInfo(dk2),jnames=Object.values(ji),tp=totalPeople(dk2);
    cg.appendChild(h("div",{className:"cc"+(isSel?" sel":"")+(cards&&cards.length?"":" empty"),onClick:()=>{S.sel=S.sel===dk2?null:dk2;S.edId=null;S.eiIdx=null;S.cc=null;render();}},
      h("div",{className:"dn"},tc?h("div",{className:"leg-d",style:{background:tc.dt}}):null,String(d),cards&&cards.length>1?h("span",{className:"mbdg"},String(cards.length)):null,tp>0?h("span",{className:"hcnt"},String(tp)):null),
      first?h("div",{className:"dt2"},(tc?tc.ic:"")+" "+first.t):null,
      jnames.length>0?h("div",{className:"jrs"},...jnames.slice(0,3).map(v=>h("span",{style:{background:tc?tc.dt:"#999"}},v.name))):null
    ));
  }
  app.appendChild(h("div",{className:"cal"},h("div",{className:"calhd"},...DW.map(d=>h("div",null,d))),cg));

  // Detail
  if(S.sel){
    const selCards=S.days[S.sel];
    const hasCards=selCards&&selCards.length>0;
    const dw=h("div",{className:"ai"});
    dw.appendChild(h("div",{className:"ddate"},fd(pd(S.sel))));

    if(hasCards){
    selCards.forEach(card=>{
      const stc=T[card.ty]||T.sf,isEd=admin&&S.edId===card.id;
      const cr=h("div",{className:"crd",style:{borderColor:stc.br}});

      // Header
      const hl=h("div",{style:{flex:"1"}});
      hl.appendChild(h("div",{className:"crd-ty",style:{color:stc.dt}},stc.lb));
      if(isEd){const ti=h("input",{value:card.t});ti.style.cssText="width:100%;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:14px;font-weight:700;outline:none";ti.addEventListener("input",e=>updCard(S.sel,card.id,"t",e.target.value,true));const tw=h("div",{className:"crd-t"});tw.appendChild(ti);hl.appendChild(tw);}
      else hl.appendChild(h("div",{className:"crd-t"},card.t));

      const hb=h("div",{className:"cbtns"});
      if(admin)hb.appendChild(h("button",{className:"bedit"+(isEd?" a":""),onClick:()=>{S.edId=isEd?null:card.id;S.eiIdx=null;S.cc=null;render();}},isEd?"Done":"✎"));
      hb.appendChild(h("button",{className:"bcls",onClick:()=>{S.sel=null;S.edId=null;render();}},"✕"));
      cr.appendChild(h("div",{className:"crd-h"},hl,hb));

      // Type selector (admin edit)
      if(isEd)cr.appendChild(h("div",{className:"tsel"},...Object.keys(T).map(k=>h("button",{className:"tbtn",style:{border:"2px solid "+(card.ty===k?T[k].dt:"#eee"),background:card.ty===k?T[k].bg:"#fff",color:T[k].dt},onClick:()=>updCard(S.sel,card.id,"ty",k)},T[k].lb))));

      // Activities
      const ad=h("div",{className:"acts"});
      card.a.forEach((act,i)=>{
        if(isEd){
          const pk=card.id+"-"+i,sp=S.eiIdx===pk;
          const rw=h("div");
          const er=h("div",{className:"aed"},
            h("button",{className:"ibtn",onClick:()=>{S.eiIdx=sp?null:pk;render();}},act.ic||"🔵"),
            (()=>{const inp=h("input",{className:"tmi",value:act.tm,placeholder:"Time"});inp.addEventListener("input",e=>updAct(S.sel,card.id,i,"tm",e.target.value,true));return inp;})(),
            (()=>{const inp=h("input",{className:"txi",value:act.tx});inp.addEventListener("input",e=>updAct(S.sel,card.id,i,"tx",e.target.value,true));return inp;})(),
            h("button",{className:"rbtn",onClick:()=>rmAct(S.sel,card.id,i)},"✕")
          );
          rw.appendChild(er);
          if(sp)rw.appendChild(h("div",{className:"ipk"},...IC.map(ic=>h("button",{className:act.ic===ic?"s":"",onClick:()=>{updAct(S.sel,card.id,i,"ic",ic);S.eiIdx=null;render();}},ic))));
          ad.appendChild(rw);
        }else{
          ad.appendChild(h("div",{className:"arow"},
            act.ic?h("span",{className:"aic"},act.ic):h("div",{className:"adot",style:{background:stc.dt}}),
            act.tm?h("span",{className:"atm",style:{color:stc.dt}},act.tm):null,
            h("span",{className:"atx"},act.tx)
          ));
        }
      });
      if(isEd)ad.appendChild(h("button",{className:"aab",onClick:()=>addAct(S.sel,card.id)},"+  Add activity"));
      cr.appendChild(ad);

      // Stay
      if(card.s||isEd){
        const sb=h("div",{className:"sbox"},h("div",{className:"slb"},"🏨 Staying"));
        if(isEd){const si=h("input",{className:"sinp",value:card.s,placeholder:"Hotel / Airbnb..."});si.addEventListener("input",e=>updCard(S.sel,card.id,"s",e.target.value,true));sb.appendChild(si);}
        else sb.appendChild(h("div",{className:"svl"},card.s||"Not set"));
        cr.appendChild(sb);
      }

      // Tip
      if(isEd){const tw=h("div",{style:{marginBottom:"10px"}},h("div",{className:"slb"},"💡 Tip"));const ti=h("input",{className:"sinp",value:card.tip||"",placeholder:"Add a tip..."});ti.addEventListener("input",e=>updCard(S.sel,card.id,"tip",e.target.value,true));tw.appendChild(ti);cr.appendChild(tw);}
      else if(card.tip)cr.appendChild(h("div",{className:"tipb"},"💡 "+card.tip));

      // Remove (admin)
      if(isEd){
        if(S.cc===card.id)cr.appendChild(h("div",{className:"cfb"},h("p",null,"Remove this card?"),h("div",{className:"bs"},h("button",{className:"y",onClick:()=>rmCard(S.sel,card.id)},"Yes, remove"),h("button",{className:"n",onClick:()=>{S.cc=null;render();}},"Cancel"))));
        else cr.appendChild(h("button",{className:"rmcb",onClick:()=>{S.cc=card.id;render();}},"🗑 Remove this card"));
      }
      dw.appendChild(cr);
    });
    }else{
      // Empty day - no cards
      dw.appendChild(h("div",{style:{textAlign:"center",padding:"20px",color:"#bbb",fontSize:"13px"}},"No plans yet for this day"));
    }

    // Add card (admin)
    if(admin)dw.appendChild(h("button",{className:"acb",onClick:()=>addCard(S.sel)},"+  Add a card"));

    // Join section
    const ji=getJoinInfo(S.sel),myKey=S.user.email,joined=!!ji[myKey],tp=totalPeople(S.sel);
    const js=h("div",{className:"jsec"});
    js.appendChild(h("div",{className:"jh"},
      h("span",{className:"jlb"},"Who's joining?"+(tp>0?" ("+tp+" people)":"")),
      h("button",{className:"jbtn",style:{background:joined?"#3b82f6":"#eee",color:joined?"#fff":"#777"},onClick:()=>toggleJoin(S.sel)},joined?"✓ Joined":"+ Join")
    ));

    const jnames=Object.values(ji);
    if(jnames.length>0){
      js.appendChild(h("div",{className:"jns"},...jnames.map(v=>h("div",{className:"jp"},v.name,v.count>1?h("span",{className:"cnt"},"×"+v.count):null))));
    }else{
      js.appendChild(h("div",{className:"jem"},"No one yet"));
    }

    // Headcount picker (if joined)
    if(joined){
      const myCount=ji[myKey].count||1;
      const hcw=h("div",{className:"hcwrap"},
        h("label",null,"Total in your group:"),
        h("button",{className:"pm",onClick:()=>setCount(S.sel,myCount-1)},"-"),
        h("span",{className:"num"},String(myCount)),
        h("button",{className:"pm",onClick:()=>setCount(S.sel,myCount+1)},"+")
      );
      js.appendChild(hcw);

      // Calendar export
      js.appendChild(h("div",{className:"calexp"},
        h("button",{onClick:()=>{window.open(makeGcalUrl(S.sel),"_blank");}},"📅 Google Calendar"),
        h("button",{onClick:()=>makeICS(S.sel)},"🍎 Apple / iOS")
      ));
    }
    dw.appendChild(js);
    app.appendChild(dw);
  }

  // Highlights
  if(!S.sel){
    const hl2=h("div",{className:"hl"},h("h3",null,"Highlights & Trips"));
    Object.keys(S.days).sort().forEach(dk2=>{
      S.days[dk2].forEach(card=>{
        if(card.ty==="sf"||card.ty==="rs")return;
        const xtc=T[card.ty]||T.sf,ji=getJoinInfo(dk2),jn=Object.values(ji),tp=totalPeople(dk2);
        hl2.appendChild(h("div",{className:"hli",onClick:()=>{S.sel=dk2;S.month=pd(dk2).getMonth();S.edId=null;render();}},
          h("div",{className:"hld",style:{background:xtc.dt}}),
          h("div",{className:"hlif"},
            h("div",{className:"hlt"},xtc.ic+" "+card.t),
            h("div",{className:"hldt"},fd(pd(dk2))+(tp>0?" • "+tp+" people":""))
          ),
          jn.length>0?h("div",{style:{display:"flex",gap:"2px"}},...jn.slice(0,3).map(v=>h("span",{style:{fontSize:"7px",background:xtc.dt,color:"#fff",padding:"1px 5px",borderRadius:"6px"}},v.name))):null,
          h("span",{className:"hla"},"›")
        ));
      });
    });
    app.appendChild(hl2);
  }
}

init();
</script>
